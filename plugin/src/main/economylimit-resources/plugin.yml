name: EconomyLimit
version: '1.0.2'
main: cn.superiormc.economylimit.EconomyLimitPlugin
api-version: '1.20'
depend:
  - Vault
softdepend:
  - PlaceholderAPI
commands:
  economylimit:
    aliases:
      - elimit
    description: EconomyLimit main command
    usage: /economylimit
permissions:
  economylimit.withdraw:
    default: true
  economylimit.admin.reload:
    default: op
  economylimit.admin.status:
    default: op
  economylimit.admin.debug:
    default: op
